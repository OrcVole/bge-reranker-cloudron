# Immediate-health reverse proxy in front of TEI.
#
# TEI does not bind its HTTP port until its model warmup finishes (about 45 seconds for this model on
# CPU). During that window /health is unreachable, and Cloudron's health check would restart-loop the
# container before warmup completes. nginx listens on the manifest httpPort (8080) immediately, answers
# /health 200 from the first second, and proxies everything else to TEI on 127.0.0.1:8081.
#
# TEI runs as the container's main process (PID 1, via exec gosu in start.sh), so if TEI ever exits the
# container exits and Cloudron restarts it. The static /health therefore cannot mask a real crash: it
# only bridges the startup warmup. See the field guide section 9 and Appendix B.4.
#
# All writable paths are under /run (a tmpfs) because the root filesystem is read-only at runtime.

worker_processes 1;
daemon off;
pid /run/nginx/nginx.pid;
# Use the "stderr" keyword (writes the already-open, inherited fd 2 directly), NOT the "/dev/stderr"
# path: as the unprivileged cloudron user on Cloudron, open("/dev/stderr") fails with EACCES because
# the fd-2 target is root-owned, which silently prevents nginx from starting. Writing the inherited fd
# needs no open() and works.
error_log stderr warn;

events { worker_connections 1024; }

http {
  access_log off;
  client_body_temp_path /run/nginx/body;
  proxy_temp_path       /run/nginx/proxy;
  fastcgi_temp_path     /run/nginx/fastcgi;
  uwsgi_temp_path       /run/nginx/uwsgi;
  scgi_temp_path        /run/nginx/scgi;

  # Large rerank payloads (a query plus many candidate passages).
  client_max_body_size 8m;

  server {
    listen 8080;
    server_name _;

    # Platform liveness: always available, even during TEI warmup.
    location = /health {
      access_log off;
      add_header Content-Type text/plain;
      return 200 'ok';
    }

    # The bare domain serves a small public landing page (what the API is and how to use it) instead
    # of a blank page. API clients use /rerank and friends, not "/". default_type is set because this
    # config does not include mime.types, and the page must be served as HTML, not octet-stream.
    location = / {
      root /app/code/www;
      default_type text/html;
      try_files /index.html =404;
    }

    # Everything else goes to TEI. During warmup TEI is not up yet, so these return 502 briefly.
    location / {
      proxy_pass http://127.0.0.1:8081;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_connect_timeout 5s;
      proxy_read_timeout 600s;
      proxy_send_timeout 600s;
    }
  }
}
